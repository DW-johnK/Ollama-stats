<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Ollama — Model Explorer, Comparator & Benchmarks</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ── Light Theme (default) ── */
:root{
  --bg:#ffffff;--card:#f5f5f5;--card2:#ebebeb;--border:#e5e5e5;
  --text:#262626;--muted:#737373;--accent:#d40808;--accent2:#a10606;
  --green:#16a34a;--blue:#2563eb;--red:#dc2626;--orange:#ea580c;
  --cyan:#0891b2;--pink:#db2777;--yellow:#ca8a04;
  --header-bg:#ffffff;--header-border:var(--accent);
  --input-bg:#ffffff;--input-shadow:rgba(212,8,8,0.1);
  --modal-bg:#ffffff;--modal-shadow:rgba(0,0,0,0.15);--overlay-bg:rgba(0,0,0,.5);
  --card-bg:#ffffff;--card-shadow:rgba(0,0,0,0.06);--card-hover-shadow:rgba(212,8,8,0.08);
  --cap-vision-bg:#eff6ff;--cap-vision-text:#2563eb;
  --cap-tools-bg:#f0fdf4;--cap-tools-text:#16a34a;
  --cap-thinking-bg:#faf5ff;--cap-thinking-text:#7c3aed;
  --cap-cloud-bg:#eef2ff;--cap-cloud-text:#4f46e5;
  --cap-audio-bg:#fdf2f8;--cap-audio-text:#db2777;
  --cap-embedding-bg:#f0fdf4;--cap-embedding-text:#16a34a;
  --cloud-bg:linear-gradient(135deg,#eef2ff,#f5f3ff);--cloud-border:#c7d2fe;
  --cloud-title:#4f46e5;--cloud-name:#4f46e5;--cloud-price:#262626;--cloud-info:#6366f1;
  --cloud-tier-bg:rgba(79,70,229,.08);
  --cost-empty:#e5e5e5;
  --compare-bar-bg:#ffffff;--compare-bar-shadow:rgba(0,0,0,0.1);
  --compare-item-bg:var(--accent);--compare-item-text:white;--compare-item-btn:rgba(255,255,255,0.7);
  --row-hover:rgba(212,8,8,0.03);
}

/* ── Dark Theme ── */
[data-theme="dark"]{
  --bg:#080c14;--card:#111827;--card2:#1a2332;--border:#1e293b;
  --text:#e2e8f0;--muted:#94a3b8;--accent:#8b5cf6;--accent2:#6d28d9;
  --green:#22c55e;--blue:#3b82f6;--red:#ef4444;--orange:#f59e0b;
  --cyan:#06b6d4;--pink:#ec4899;--yellow:#eab308;
  --header-bg:linear-gradient(135deg,#1a1033 0%,#0f172a 50%,#0c1425 100%);--header-border:var(--border);
  --input-bg:var(--card);--input-shadow:rgba(139,92,246,0.2);
  --modal-bg:var(--card);--modal-shadow:rgba(0,0,0,0.75);--overlay-bg:rgba(0,0,0,.75);
  --card-bg:var(--card);--card-shadow:none;--card-hover-shadow:rgba(139,92,246,0.12);
  --cap-vision-bg:#1e3a5f;--cap-vision-text:#60a5fa;
  --cap-tools-bg:#1a3326;--cap-tools-text:#4ade80;
  --cap-thinking-bg:#2d1b4e;--cap-thinking-text:#a78bfa;
  --cap-cloud-bg:#1e1b4b;--cap-cloud-text:#818cf8;
  --cap-audio-bg:#3b1d2e;--cap-audio-text:#f472b6;
  --cap-embedding-bg:#1a2e1a;--cap-embedding-text:#86efac;
  --cloud-bg:linear-gradient(135deg,#1e1b4b,#0f172a);--cloud-border:#4338ca;
  --cloud-title:#818cf8;--cloud-name:#a5b4fc;--cloud-price:white;--cloud-info:#818cf8;
  --cloud-tier-bg:rgba(67,56,202,.2);
  --cost-empty:var(--card2);
  --compare-bar-bg:var(--card);--compare-bar-shadow:none;
  --compare-item-bg:var(--accent2);--compare-item-text:var(--text);--compare-item-btn:var(--muted);
  --row-hover:rgba(139,92,246,.05);
}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.header{background:var(--header-bg);border-bottom:2px solid var(--header-border);padding:14px 24px;position:sticky;top:0;z-index:100;transition:background .3s,border-color .3s}
.header-inner{max-width:1800px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:800;color:var(--text);white-space:nowrap}
.logo-icon{width:36px;height:36px;border-radius:8px;object-fit:contain}
.logo-sub{font-size:12px;color:var(--muted);margin-left:6px}
.search-box{flex:1;min-width:180px;max-width:360px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 34px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--input-shadow)}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted)}
select{background:var(--input-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;cursor:pointer}

/* Stats */
.stats{display:flex;gap:10px;padding:12px 24px;background:var(--card);border-bottom:1px solid var(--border)}
.stat{text-align:center;padding:6px 14px}
.stat-val{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

/* Controls */
.controls{padding:10px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--bg);border-bottom:1px solid var(--border)}
.controls label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cap-filters{display:flex;gap:5px;flex-wrap:wrap}
.cap-btn{padding:4px 10px;border-radius:16px;border:1px solid var(--border);background:var(--input-bg);color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
.cap-btn:hover,.cap-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
.cap-btn.cloud{border-color:#6366f1;color:#4f46e5}
.cap-btn.cloud:hover,.cap-btn.cloud.active{background:#4f46e5;color:white}
.view-btns{margin-left:auto;display:flex;gap:5px}
.view-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--muted);font-size:11px;cursor:pointer;transition:all .15s}
.view-btn:hover,.view-btn.active{background:var(--accent);color:white;border-color:var(--accent)}

/* Layout */
.main{display:flex;max-width:1800px;margin:0 auto}
.sidebar{width:200px;min-width:200px;padding:12px;border-right:1px solid var(--border);height:calc(100vh - 130px);overflow-y:auto;position:sticky;top:130px}
.sidebar h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.owner-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;cursor:pointer;transition:background .15s;font-size:12px}
.owner-item:hover{background:var(--card)}
.owner-item.active{background:var(--accent);color:white}
.owner-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.owner-count{margin-left:auto;font-size:10px;color:var(--muted);background:var(--card);padding:1px 5px;border-radius:8px}

/* Content */
.content{flex:1;padding:12px;overflow-y:auto}

/* Model Cards */
.models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.model-card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .2s;position:relative;box-shadow:0 1px 3px var(--card-shadow)}
.model-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px var(--card-hover-shadow)}
.model-card.cloud-card{border-left:3px solid #6366f1}
.model-name{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:15px;font-weight:700;color:var(--text)}
.model-desc{font-size:12px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.model-meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.model-pulls{font-size:11px;color:var(--green);font-weight:600}
.model-tags-count{font-size:11px;color:var(--muted)}
.cap-tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500}
.cap-tag.vision{background:var(--cap-vision-bg);color:var(--cap-vision-text)}
.cap-tag.tools{background:var(--cap-tools-bg);color:var(--cap-tools-text)}
.cap-tag.thinking{background:var(--cap-thinking-bg);color:var(--cap-thinking-text)}
.cap-tag.cloud{background:var(--cap-cloud-bg);color:var(--cap-cloud-text)}
.cap-tag.audio{background:var(--cap-audio-bg);color:var(--cap-audio-text)}
.cap-tag.embedding{background:var(--cap-embedding-bg);color:var(--cap-embedding-text)}
.size-tag{display:inline-block;padding:2px 5px;border-radius:4px;font-size:10px;font-family:monospace;background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.owner-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.popularity-bar{height:2px;border-radius:1px;background:var(--card2);margin-top:6px;overflow:hidden}
.popularity-fill{height:100%;border-radius:1px;background:linear-gradient(90deg,var(--accent),var(--green))}
.actions{display:flex;gap:5px;margin-top:8px}
.btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--input-bg);color:var(--muted);font-size:10px;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--accent);color:white;border-color:var(--accent)}
.btn.primary{background:var(--accent);color:white;border-color:var(--accent)}
.btn.primary:hover{background:var(--accent2)}

/* Benchmark bars on cards */
.bench-section{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.bench-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px}
.bench-label{width:55px;color:var(--muted);text-align:right;flex-shrink:0;font-weight:500}
.bench-bar-bg{flex:1;height:5px;background:var(--card2);border-radius:2px;overflow:hidden;position:relative}
.bench-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.bench-val{width:30px;text-align:right;font-weight:600;font-size:9px;flex-shrink:0}
.bench-best{color:var(--green);font-size:8px;margin-left:2px}

/* Usage Level (Cost) */
.usage-level{display:flex;align-items:center;gap:3px;margin-top:5px}
.usage-bar{width:18px;height:5px;border-radius:2px;background:var(--card2)}
.usage-bar.filled.low{background:var(--green)}
.usage-bar.filled.medium{background:var(--orange)}
.usage-bar.filled.high{background:#f97316}
.usage-bar.filled.extra-high{background:var(--red)}
.usage-label{font-size:10px;color:var(--muted);margin-left:3px}

/* Compare */
.compare-bar{position:fixed;bottom:0;left:0;right:0;background:var(--compare-bar-bg);border-top:2px solid var(--accent);padding:10px 24px;display:flex;align-items:center;gap:10px;z-index:200;transform:translateY(100%);transition:transform .3s;box-shadow:0 -2px 10px var(--compare-bar-shadow)}
.compare-bar.visible{transform:translateY(0)}
.compare-bar .compare-items{display:flex;gap:6px;flex:1;flex-wrap:wrap}
.compare-item{background:var(--compare-item-bg);padding:3px 8px;border-radius:6px;font-size:11px;display:flex;align-items:center;gap:5px;color:var(--compare-item-text)}
.compare-item button{background:none;border:none;color:var(--compare-item-btn);cursor:pointer;font-size:13px;padding:0 1px}
.compare-btn{padding:7px 16px;border-radius:6px;background:var(--accent);color:white;border:none;font-size:12px;font-weight:600;cursor:pointer}
.compare-btn:hover{background:var(--accent2)}

/* Compare Modal */
.modal-overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:300;display:none;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--modal-bg);border:1px solid var(--border);border-radius:10px;max-width:95vw;max-height:90vh;overflow:auto;padding:20px;width:1400px;position:relative;box-shadow:0 20px 60px var(--modal-shadow)}
.modal h2{margin-bottom:14px;font-size:18px}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.compare-table{width:100%;border-collapse:collapse;font-size:12px}
.compare-table th{background:var(--card2);padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.compare-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.compare-table tr:hover td{background:var(--row-hover)}

/* Group Header */
.group-header{display:flex;align-items:center;gap:10px;padding:10px 0 6px;margin-top:12px;border-bottom:1px solid var(--border)}
.group-header:first-child{margin-top:0}
.group-dot{width:10px;height:10px;border-radius:50%}
.group-name{font-size:15px;font-weight:700}
.group-count{font-size:11px;color:var(--muted)}
.group-pulls{font-size:11px;color:var(--green);margin-left:auto}

/* Cloud Pricing */
.cloud-pricing{background:var(--cloud-bg);border:1px solid var(--cloud-border);border-radius:8px;padding:14px;margin-bottom:14px}
.cloud-pricing h3{font-size:13px;color:var(--cloud-title);margin-bottom:6px}
.pricing-tiers{display:flex;gap:10px;flex-wrap:wrap}
.pricing-tier{background:var(--cloud-tier-bg);border:1px solid var(--cloud-border);border-radius:6px;padding:8px 12px;text-align:center;flex:1;min-width:100px}
.pricing-tier .tier-name{font-size:12px;font-weight:700;color:var(--cloud-name)}
.pricing-tier .tier-price{font-size:18px;font-weight:800;color:var(--cloud-price);margin:3px 0}
.pricing-tier .tier-info{font-size:10px;color:var(--cloud-info)}

/* Cost indicator */
.cost-indicator{display:inline-flex;gap:2px;align-items:center}
.cost-dot{width:7px;height:7px;border-radius:50%;background:var(--cost-empty)}
.cost-dot.on{background:var(--green)}
.cost-dot.on.med{background:var(--orange)}
.cost-dot.on.high{background:#f97316}
.cost-dot.on.xhigh{background:var(--red)}

/* Sortable Table Headers */
.compare-table th[data-sort]{cursor:pointer;user-select:none;white-space:nowrap}
.compare-table th[data-sort]:hover{background:var(--card2);color:var(--accent)}
.compare-table th[data-sort]::after{content:'';margin-left:3px;font-size:9px;opacity:.4}
.compare-table th[data-sort].sort-desc::after{content:'▼';opacity:1;color:var(--accent)}
.compare-table th[data-sort].sort-asc::after{content:'▲';opacity:1;color:var(--accent)}

/* Benchmark Filters */
.bench-filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.bench-filters label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.bench-filter-btn{padding:3px 8px;border-radius:14px;border:1px solid var(--border);background:var(--input-bg);color:var(--muted);font-size:10px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.bench-filter-btn:hover{border-color:var(--accent);color:var(--text)}
.bench-filter-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
.bench-filter-btn .bf-color{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bench-range{display:inline-flex;align-items:center;gap:4px;margin-left:2px}
.bench-range input[type=range]{width:60px;height:3px;-webkit-appearance:none;appearance:none;background:var(--card2);border-radius:2px;outline:none;cursor:pointer}
.bench-range input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer}
.bench-range-val{font-size:9px;color:var(--muted);width:24px;text-align:right;font-family:monospace}
.bench-toggle{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--input-bg);color:var(--muted);font-size:10px;cursor:pointer;transition:all .15s;font-weight:600}
.bench-toggle:hover{border-color:var(--accent);color:var(--text)}
.bench-toggle.active{background:#4f46e5;color:white;border-color:#6366f1}

/* Collapsible column groups */
.vision-col, .embed-col { transition: opacity 0.2s; }
.vision-col.hidden, .embed-col.hidden { display: none; }

/* Size tags */
.size-tag { display:inline-block; padding:1px 5px; border-radius:4px; background:var(--card2); color:var(--text); font-size:10px; font-family:monospace; margin:1px; }

/* Size filter buttons */
.size-filters { display:flex; gap:4px; flex-wrap:wrap; align-items:center; margin-left:4px; }
.size-btn { padding:4px 10px; border-radius:16px; border:1px solid var(--border); background:var(--input-bg); color:var(--muted); font-size:11px; cursor:pointer; transition:all .15s; font-family:monospace; }
.size-btn:hover { border-color:var(--accent); color:var(--text); }
.size-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

/* Collapsible filter panels */
.filter-panels { margin:0 24px 12px; display:flex; flex-direction:column; gap:0; }
.filter-panel { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.filter-panel+.filter-panel { margin-top:-1px; }
.filter-panel-header { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; background:var(--card); cursor:pointer; font-size:13px; font-weight:600; color:var(--text); transition:background .15s; user-select:none; }
.filter-panel-header:hover { background:var(--card2); }
.panel-arrow { font-size:12px; transition:transform .2s; }
.panel-arrow.open { transform:rotate(90deg); }
.filter-panel-body { display:none; padding:12px 14px; border-top:1px solid var(--border); background:var(--bg); }
.filter-panel-body.open { display:block; }
.filter-panel-body .cap-filters, .filter-panel-body .size-filters { margin-bottom:8px; }

/* Bench filters inside panel */
.filter-panel-body .bench-filters { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.filter-panel-body .bench-range { display:flex; align-items:center; gap:4px; margin:4px 0; }
.filter-panel-body .bench-range-val { min-width:24px; }
.filter-panel-body .bench-toggle { margin-bottom:4px; }

.no-results{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo"><img src="favicon-32.png" class="logo-icon" alt="🦙">Open Ollama</div>
    <span class="logo-sub">Benchmarks & Cost Comparator</span>
    <button onclick="toggleTheme()" id="themeToggle" style="margin-left:4px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);cursor:pointer;font-size:14px;line-height:1;transition:all .15s" title="Toggle light/dark theme">🌓</button>
    <div class="search-box">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
      <input type="text" id="search" placeholder="Search models, owners..." oninput="render()">
    </div>
    <select id="sort" onchange="render()">
      <option value="pulls-desc">Most Popular</option>
      <option value="pulls-asc">Least Popular</option>
      <option value="name-asc">Name A→Z</option>
      <option value="name-desc">Name Z→A</option>
      <option value="tags-desc">Most Tags</option>
      <option value="updated-desc">Newest</option>
      <option value="usage-asc">Cost: Low→High</option>
      <option value="usage-desc">Cost: High→Low</option>
      <option value="context-asc">Context: Short→Long</option>
      <option value="context-desc">Context: Long→Short</option>
      <option value="bench-mmlu">MMLU ↓</option>
      <option value="bench-mmlu-asc">MMLU ↑</option>
      <option value="bench-humaneval">HumanEval ↓</option>
      <option value="bench-humaneval-asc">HumanEval ↑</option>
      <option value="bench-math">MATH ↓</option>
      <option value="bench-math-asc">MATH ↑</option>
      <option value="bench-gpqa">GPQA ↓</option>
      <option value="bench-gpqa-asc">GPQA ↑</option>
      <option value="bench-gsm8k">GSM8K ↓</option>
      <option value="bench-gsm8k-asc">GSM8K ↑</option>
      <option value="bench-swe">SWE-bench ↓</option>
      <option value="bench-swe-asc">SWE-bench ↑</option>
      <option value="bench-livecode">LiveCodeBench ↓</option>
      <option value="bench-livecode-asc">LiveCodeBench ↑</option>
      <option value="bench-aime">AIME ↓</option>
      <option value="bench-aime-asc">AIME ↑</option>
      <option value="bench-arena">Arena Elo ↓</option>
      <option value="bench-arena-asc">Arena Elo ↑</option>
      <option value="bench-mmmu">MMMU-Pro ↓</option>
      <option value="bench-mmmu-asc">MMMU-Pro ↑</option>
      <option value="bench-docvqa">DocVQA ↓</option>
      <option value="bench-docvqa-asc">DocVQA ↑</option>
      <option value="bench-mathvista">MathVista ↓</option>
      <option value="bench-mathvista-asc">MathVista ↑</option>

function getOwner(model) {
  const n = model.n.toLowerCase();
  if (n.startsWith('gemma') || n.startsWith('medgemma') || n.startsWith('codegemma') || n.startsWith('recurrentgemma')) return 'Google DeepMind';
  if (n.startsWith('qwen') || n.startsWith('qwq') || n.startsWith('codeqwen')) return 'Alibaba Cloud';
  if (n.startsWith('deepseek') || n.startsWith('r1')) return 'DeepSeek';
  if (n.startsWith('llama') || n.startsWith('codellama')) return 'Meta';
  if (n.startsWith('nemotron')) return 'NVIDIA';
  if (n.startsWith('gpt-oss')) return 'OpenAI';
  if (n.startsWith('mistral') || n.startsWith('mixtral') || n.startsWith('codestral') || n.startsWith('mathstral') || n.startsWith('pixtral')) return 'Mistral AI';
  if (n.startsWith('glm')) return 'Zhipu AI';
  if (n.startsWith('minimax') || n.startsWith('m2.') || n.startsWith('m3')) return 'MiniMax';
  if (n.startsWith('kimi')) return 'Moonshot AI';
  if (n.startsWith('nomic')) return 'Nomic AI';
  if (n.startsWith('phi')) return 'Microsoft';
  if (n.startsWith('granite')) return 'IBM';
  if (n.startsWith('command')) return 'Cohere';
  if (n.startsWith('olmo') || n.startsWith('tulu')) return 'Allen AI';
  return 'Others';
}

function getUsage(model) { return CLOUD_USAGE[model.n] || null; }
function getMaxContext(model) {
  const usage = getUsage(model);
  if (!usage) return null;
  // Parse context strings like "128K", "256K" to numeric values
  const parseCtx = s => { const m = s.match(/([\d.]+)\s*([KMGT]?)/i); if (!m) return 0; const n = parseFloat(m[1]); const mult = ({'K':1024,'M':1048576,'G':1073741824,'T':1099511627776}[m[2].toUpperCase()]||1); return n * mult; };
  return Math.max(...usage.map(u => parseCtx(u.context)));
}
function getBench(model) { return BENCHMARKS[model.n] || null; }
function formatPulls(n) { if (n>=1e6) return (n/1e6).toFixed(1)+'M'; if (n>=1e3) return (n/1e3).toFixed(1)+'K'; return n.toString(); }

function getModels() {
  let models = [...MODELS];
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;
  const bf = getBenchFilters();
  if (q) models = models.filter(m => m.n.toLowerCase().includes(q) || (m.d||'').toLowerCase().includes(q) || getOwner(m).toLowerCase().includes(q) || (m.c||[]).some(c => c.toLowerCase().includes(q)));
  if (activeCaps.size > 0) models = models.filter(m => (m.c||[]).some(c => activeCaps.has(c)));
  if (activeSizeBuckets.size > 0) {
    const parseSize = s => parseFloat(s.toLowerCase().replace('b',''));
    models = models.filter(m => {
      const sizes = (m.s||[]).map(parseSize);
      if (sizes.length === 0) return false;
      const minSize = Math.min(...sizes);
      return [...activeSizeBuckets].some(label => {
        const bucket = SIZE_BUCKETS.find(b => b.label === label);
        return bucket && minSize >= bucket.min && minSize < bucket.max;
      });
    });
  }
  if (activeOwner) models = models.filter(m => getOwner(m) === activeOwner);
  if (benchOnly) models = models.filter(m => getBench(m));

  // Apply benchmark min-score filters
  models = models.filter(m => {
    const b = getBench(m);
    // If no benchmark data and any filter is active, exclude
    if (!b) {
      const anyFilter = Object.values(bf).some(v => v > 0);
      return !anyFilter;
    }
    if (bf.mmlu > 0 && (b.mmlu == null || b.mmlu < bf.mmlu)) return false;
    if (bf.humaneval > 0 && (b.humaneval == null || b.humaneval < bf.humaneval)) return false;
    if (bf.math > 0 && (b.math == null || b.math < bf.math)) return false;
    if (bf.gpqa > 0 && (b.gpqa == null || b.gpqa < bf.gpqa)) return false;
    if (bf.swe_bench > 0 && (b.swe_bench == null || b.swe_bench < bf.swe_bench)) return false;
    if (bf.livecodebench > 0 && (b.livecodebench == null || b.livecodebench < bf.livecodebench)) return false;
    if (bf.arena_elo > 0 && (b.arena_elo == null || b.arena_elo < bf.arena_elo)) return false;
    return true;
  });

  // Helper: for benchmark sorts, push models without data to the bottom
  function benchSort(a, b, key, desc) {
    const va = getBench(a)?.[key], vb = getBench(b)?.[key];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;  // nulls always go to bottom
    if (vb == null) return -1; // nulls always go to bottom
    return desc ? vb - va : va - vb;
  }

  models.sort((a,b) => {
    const ba = getBench(a), bb = getBench(b);
    switch(sort) {
      case 'pulls-desc': return (b.p||0)-(a.p||0);
      case 'pulls-asc': return (a.p||0)-(b.p||0);
      case 'name-asc': return a.n.localeCompare(b.n);
      case 'name-desc': return b.n.localeCompare(a.n);
      case 'tags-desc': return (b.tc||0)-(a.tc||0);
      case 'usage-asc': { const ua=getUsage(a),ub=getUsage(b); return (ua?Math.min(...ua.map(x=>USAGE_ORDER[x.usage]||0)):99)-(ub?Math.min(...ub.map(x=>USAGE_ORDER[x.usage]||0)):99); }
      case 'usage-desc': { const ua=getUsage(a),ub=getUsage(b); return (ub?Math.max(...ub.map(x=>USAGE_ORDER[x.usage]||0)):0)-(ua?Math.max(...ua.map(x=>USAGE_ORDER[x.usage]||0)):0); }
      case 'context-asc': { const ca=getMaxContext(a),cb=getMaxContext(b); return (ca??Infinity)-(cb??Infinity); }
      case 'context-desc': { const ca=getMaxContext(a),cb=getMaxContext(b); return (cb??0)-(ca??0); }
      case 'bench-mmlu': return benchSort(a,b,'mmlu',true);
      case 'bench-mmlu-asc': return benchSort(a,b,'mmlu',false);
      case 'bench-humaneval': return benchSort(a,b,'humaneval',true);
      case 'bench-humaneval-asc': return benchSort(a,b,'humaneval',false);
      case 'bench-math': return benchSort(a,b,'math',true);
      case 'bench-math-asc': return benchSort(a,b,'math',false);
      case 'bench-gpqa': return benchSort(a,b,'gpqa',true);
      case 'bench-gpqa-asc': return benchSort(a,b,'gpqa',false);
      case 'bench-gsm8k': return benchSort(a,b,'gsm8k',true);
      case 'bench-gsm8k-asc': return benchSort(a,b,'gsm8k',false);
      case 'bench-swe': return benchSort(a,b,'swe_bench',true);
      case 'bench-swe-asc': return benchSort(a,b,'swe_bench',false);
      case 'bench-livecode': return benchSort(a,b,'livecodebench',true);
      case 'bench-livecode-asc': return benchSort(a,b,'livecodebench',false);
      case 'bench-aime': return benchSort(a,b,'aime',true);
      case 'bench-aime-asc': return benchSort(a,b,'aime',false);
      case 'bench-arena': return benchSort(a,b,'arena_elo',true);
      case 'bench-arena-asc': return benchSort(a,b,'arena_elo',false);
      case 'bench-mmmu': return benchSort(a,b,'mmmu_pro',true);
      case 'bench-mmmu-asc': return benchSort(a,b,'mmmu_pro',false);
      case 'bench-docvqa': return benchSort(a,b,'docvqa',true);
      case 'bench-docvqa-asc': return benchSort(a,b,'docvqa',false);
      case 'bench-mathvista': return benchSort(a,b,'mathvista',true);
      case 'bench-mathvista-asc': return benchSort(a,b,'mathvista',false);
      case 'bench-mmbench': return benchSort(a,b,'mmbench',true);
      case 'bench-mmbench-asc': return benchSort(a,b,'mmbench',false);
      case 'bench-mteb': return benchSort(a,b,'mteb_avg',true);
      case 'bench-mteb-asc': return benchSort(a,b,'mteb_avg',false);
      case 'bench-mteb-retrieval': return benchSort(a,b,'mteb_retrieval',true);
      case 'bench-mteb-retrieval-asc': return benchSort(a,b,'mteb_retrieval',false);
      case 'bench-mteb-classification': return benchSort(a,b,'mteb_classification',true);
      case 'bench-mteb-classification-asc': return benchSort(a,b,'mteb_classification',false);
      case 'bench-overall': return benchSort(a,b,'overall_score',true);
      case 'bench-overall-asc': return benchSort(a,b,'overall_score',false);
    }
    return 0;
  });
  return models;
}

function renderUsageBars(usage) {
  if (!usage) return '';
  const d = usage[0];
  let bc = d.usage==='Low'?'low':d.usage==='Medium'?'medium':d.usage==='High'?'high':'extra-high';
  let bars = '';
  for(let i=0;i<4;i++) bars += `<div class="usage-bar ${i<d.bars?'filled '+bc:''}"></div>`;
  return `<div class="usage-level" title="Cloud cost: ${d.usage}">${bars}<span class="usage-label">${d.usage}</span></div>`;
}

function benchBar(key, val, max) {
  if (val == null) return '';
  const pct = Math.min(100, (val / max) * 100);
  const color = BENCH_COLORS[key];
  return `<div class="bench-row"><span class="bench-label">${BENCH_NAMES[key]}</span><div class="bench-bar-bg"><div class="bench-bar-fill" style="width:${pct}%;background:${color}"></div></div><span class="bench-val" style="color:${color}">${key==='arena_elo'?val:val.toFixed(val<10?1:0)}</span></div>`;
}

    const b = getBench(m);
    const owner = getOwner(m);
    const sizes = (m.s||[]).length > 0 ? m.s.map(s=>`<span class="size-tag">${s}</span>`).join(' ') : '—';
    const caps = (m.c||[]).length > 0 ? m.c.map(c=>`<span class="cap-tag ${c}">${c}</span>`).join(' ') : '—';
    const usage = getUsage(m);
    const ctx = usage ? usage.map(u=>u.context).join(', ') : '—';
    const costDots = usage ? (() => { let d=''; const h=Math.max(...usage.map(x=>x.bars)); let bc=h<=1?'low':h===2?'medium':h===3?'high':'extra-high'; for(let i=0;i<4;i++) d+=`<div class="cost-dot ${i<h?'on '+bc:''}"></div>`; return `<div class="cost-indicator">${d}</div>`; })() : '—';

    html += `<tr>
      <td><strong style="font-family:monospace">${m.n}</strong></td>
      <td><span style="color:${OWNER_COLORS[owner]||'var(--muted)'};font-size:11px">${owner}</span></td>
      <td>${sizes}</td>
      <td>${caps}</td>
      <td style="color:var(--green);font-size:11px">${formatPulls(m.p||0)}</td>
      <td>${costDots}</td>
      <td style="font-size:11px">${ctx}</td>
      <td style="${b?.overall_score===Math.max(...models.map(x=>getBench(x)?.overall_score||0))?'color:var(--green);font-weight:700':''}">${b?b.overall_score?.toFixed(1):'—'}</td>`;
    textBenchKeys.forEach(k => {
      const v = b && b[k] != null ? b[k] : null;
      const best = Math.max(...models.map(x=>getBench(x)?.[k]||0));
      const style = v === best ? 'color:var(--green);font-weight:700' : '';
      html += `<td style="${style}">${v != null ? (k==='arena_elo'?v:v.toFixed(1)) : '—'}</td>`;
    });
    html += `<td class="vision-col">${b&&b.mmmu_pro!=null?b.mmmu_pro.toFixed(1):'—'}</td>
      <td class="vision-col">${b&&b.docvqa!=null?b.docvqa.toFixed(1):'—'}</td>
      <td class="vision-col">${b&&b.mathvista!=null?b.mathvista.toFixed(1):'—'}</td>
      <td class="vision-col">${b&&b.mmbench!=null?b.mmbench.toFixed(1):'—'}</td>
      <td class="embed-col">${b&&b.mteb_avg!=null?b.mteb_avg.toFixed(1):'—'}</td>
      <td class="embed-col">${b&&b.mteb_retrieval!=null?b.mteb_retrieval.toFixed(1):'—'}</td>
      <td class="embed-col">${b&&b.mteb_classification!=null?b.mteb_classification.toFixed(1):'—'}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function renderBenchmarkView(models) {
  const benchModels = models.filter(m => getBench(m));
  if (benchModels.length === 0) return '<div class="no-results">No models with benchmark data match your filters.</div>';

  // Sort by overall score descending
  benchModels.sort((a,b) => (getBench(b)?.overall_score||0) - (getBench(a)?.overall_score||0));

  const benchKeys = ['overall_score','mmlu','humaneval','math','gpqa','gsm8k','swe_bench','livecodebench','aime','arena_elo'];
  const maxVals = {};
  benchKeys.forEach(k => { maxVals[k] = Math.max(...benchModels.map(m => getBench(m)?.[k]||0)); });

  let html = `<h3 style="margin-bottom:12px">📊 Benchmark Rankings — ${benchModels.length} Models</h3>`;
  html += `<div style="overflow-x:auto"><table class="compare-table"><thead><tr><th data-sort="name" onclick="sortByHeader('name')">#</th><th data-sort="name" onclick="sortByHeader('name')">Model</th><th data-sort="owner" onclick="sortByHeader('owner')">Owner</th>`;
  benchKeys.forEach(k => { html += `<th data-sort="${k}" onclick="sortByHeader('${k}')" style="color:${BENCH_COLORS[k]}">${BENCH_NAMES[k]}</th>`; });
  html += `<th data-sort="pulls" onclick="sortByHeader('pulls')">Pulls</th></tr></thead><tbody>`;

  benchModels.forEach((m, i) => {
    const b = getBench(m);
    const owner = getOwner(m);
    html += `<tr${i<3?' style="background:rgba(139,92,246,0.08)"':''}><td style="font-weight:700;color:${i<3?'var(--accent)':'var(--muted)'}">${i+1}</td>
      <td><strong style="font-family:monospace">${m.n}</strong></td>
      <td><span style="color:${OWNER_COLORS[owner]||'#94a3b8'};font-size:11px">${owner}</span></td>`;
    benchKeys.forEach(k => {
      const v = b?.[k];
      if (v == null) { html += '<td>—</td>'; return; }
      const isBest = v === maxVals[k];
      const pct = (v / BENCH_MAX[k]) * 100;
      html += `<td style="${isBest?'color:var(--green);font-weight:700':''}">
        <div style="display:flex;align-items:center;gap:4px">
          <div style="width:40px;height:4px;background:var(--card2);border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${BENCH_COLORS[k]};border-radius:2px"></div></div>
          <span style="font-size:11px">${k==='arena_elo'?v:v.toFixed(1)}</span>
        </div></td>`;
    });
    html += `<td style="color:var(--green);font-size:11px">${formatPulls(m.p||0)}</td></tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function render() {
  const models = getModels();
  renderStats(models);
  renderSidebar(MODELS);
  renderCapFilters(MODELS);
  renderSizeFilters(MODELS);
  // Don't re-render bench filters on every render — they're inside a collapsible panel and manage their own state
  if (models.length === 0) { document.getElementById('content').innerHTML = '<div class="no-results">No models match your filters.</div>'; return; }

  if (viewMode === 'table') {
    document.getElementById('content').innerHTML = renderTableView(models);
  } else if (viewMode === 'benchmarks') {
    document.getElementById('content').innerHTML = renderBenchmarkView(models);
  } else {
    const groups = {};
    models.forEach(m => { const o = getOwner(m); (groups[o] = groups[o]||[]).push(m); });
    const sortedGroups = Object.entries(groups).sort((a,b) => b[1].reduce((s,m)=>s+(m.p||0),0) - a[1].reduce((s,m)=>s+(m.p||0),0));
    let html = '';
    const hasCloud = models.some(m => (m.c||[]).includes('cloud'));
    if (false && hasCloud) {
    }
    sortedGroups.forEach(([owner, oModels]) => {
      const totalPulls = oModels.reduce((s,m)=>s+(m.p||0),0);
      html += `<div class="group-header"><div class="group-dot" style="background:${OWNER_COLORS[owner]||'#94a3b8'}"></div><div class="group-name" style="color:${OWNER_COLORS[owner]||'#94a3b8'}">${owner}</div><div class="group-count">${oModels.length} models</div><div class="group-pulls">${formatPulls(totalPulls)} pulls</div></div>`;
      html += `<div class="models-grid">${oModels.map(renderModelCard).join('')}</div>`;
    });
    document.getElementById('content').innerHTML = html;
  }
  // Highlight active sort column in table headers
  highlightSortHeaders();
}

function highlightSortHeaders() {
  const sort = document.getElementById('sort').value;
  const isAsc = sort.endsWith('-asc');
  // Map sort values to data-sort keys
  const sortToKey = {
    'pulls-desc':'pulls','pulls-asc':'pulls','name-asc':'name','name-desc':'name',
    'usage-asc':'usage','usage-desc':'cost','context-asc':'context','context-desc':'context','tags-desc':'pulls','updated-desc':'pulls',
    'bench-mmlu':'mmlu','bench-mmlu-asc':'mmlu','bench-humaneval':'humaneval','bench-humaneval-asc':'humaneval',
    'bench-math':'math','bench-math-asc':'math','bench-gpqa':'gpqa','bench-gpqa-asc':'gpqa',
    'bench-gsm8k':'gsm8k','bench-gsm8k-asc':'gsm8k','bench-swe':'swe_bench','bench-swe-asc':'swe_bench',
    'bench-livecode':'livecodebench','bench-livecode-asc':'livecodebench',
    'bench-aime':'aime','bench-aime-asc':'aime','bench-arena':'arena_elo','bench-arena-asc':'arena_elo',
    'bench-overall':'overall','bench-overall-asc':'overall'
  };
  const activeKey = sortToKey[sort] || '';
  document.querySelectorAll('.compare-table th[data-sort]').forEach(th => {
    th.classList.remove('sort-desc','sort-asc');
    if (th.dataset.sort === activeKey) {
      th.classList.add(isAsc ? 'sort-asc' : 'sort-desc');
    }
  });
}

function setOwner(o) { activeOwner = o; render(); }
function toggleCap(c) { if(activeCaps.has(c)) activeCaps.delete(c); else activeCaps.add(c); render(); }
function setView(m) { viewMode = m; document.getElementById('viewCards').classList.toggle('active',m==='cards'); document.getElementById('viewTable').classList.toggle('active',m==='table'); document.getElementById('viewBench').classList.toggle('active',m==='benchmarks'); render(); }

// ── Collapsible column groups ──
const colGroups = { vision: true, embedding: true };
function toggleColGroup(group) {
  colGroups[group] = !colGroups[group];
  const cls = group === 'vision' ? 'vision-col' : 'embed-col';
  const btnId = group === 'vision' ? 'toggleVision' : 'toggleEmbedding';
  document.querySelectorAll('.' + cls).forEach(el => el.classList.toggle('hidden', !colGroups[group]));
  const btn = document.getElementById(btnId);
  if (btn) { btn.classList.toggle('active', colGroups[group]); }
}

// Click a table header to sort by that column (toggles desc/asc)
let headerSortKey = null;
let headerSortDir = 'desc';
function sortByHeader(key) {
  const sortMap = {
    'name':'name-asc','owner':'name-asc','pulls':'pulls-desc','overall':'bench-overall','mmlu':'bench-mmlu',
    'humaneval':'bench-humaneval','math':'bench-math','gpqa':'bench-gpqa','gsm8k':'bench-gsm8k',
    'swe_bench':'bench-swe','livecodebench':'bench-livecode','aime':'bench-aime','arena_elo':'bench-arena',
    'usage':'usage-desc','cost':'usage-desc','context':'context-desc','cloud_tag':'name-asc'
  };
  const sortVal = sortMap[key] || 'pulls-desc';
  // Toggle direction if same key
  if (headerSortKey === key) {
    headerSortDir = headerSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    headerSortKey = key;
    headerSortDir = 'desc';
  }
  // Set the sort dropdown to the right value
  const sel = document.getElementById('sort');
  const baseSort = sortVal.replace(/-desc$/,'').replace(/-asc$/,'');
  const targetVal = headerSortDir === 'desc' ? baseSort + (baseSort.startsWith('bench-') ? '' : '') : baseSort + '-asc';
  // Find matching option
  const opts = [...sel.options].map(o=>o.value);
  const descVal = baseSort.startsWith('bench-') ? baseSort : sortVal;
  const ascVal = baseSort.startsWith('bench-') ? baseSort + '-asc' : sortVal.replace('-desc','-asc').replace('-asc-asc','-asc');
  sel.value = opts.includes(descVal) && headerSortDir === 'desc' ? descVal : opts.includes(ascVal) ? ascVal : sortVal;
  // Force matching direction
  if (headerSortDir === 'asc' && !sel.value.endsWith('-asc')) {
    // Try to find the asc variant
    const tryAsc = sel.value + '-asc';
    if (opts.includes(tryAsc)) sel.value = tryAsc;
  } else if (headerSortDir === 'desc' && sel.value.endsWith('-asc')) {
    const tryDesc = sel.value.replace('-asc','');
    if (opts.includes(tryDesc)) sel.value = tryDesc;
  }
  render();
}
function copyPull(name) { navigator.clipboard.writeText('ollama pull '+name).then(()=>{const b=event.target;b.textContent='✓ Copied!';setTimeout(()=>b.textContent='📋 Pull',1500)}); }
function toggleCompare(name) { const i=compareList.indexOf(name); if(i>-1) compareList.splice(i,1); else if(compareList.length<5) compareList.push(name); updateCompareBar(); }
function updateCompareBar() { const b=document.getElementById('compareBar'),items=document.getElementById('compareItems'); if(!compareList.length){b.classList.remove('visible');return} b.classList.add('visible'); items.innerHTML=compareList.map(n=>`<div class="compare-item">${n}<button onclick="toggleCompare('${n}')">×</button></div>`).join(''); }
function clearCompare() { compareList=[]; updateCompareBar(); }

function showCompare() {
  const models = compareList.map(n=>MODELS.find(m=>m.n===n)).filter(Boolean);
  let html = `<button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('visible')" style="position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer">×</button>`;
  html += `<h2 style="margin-bottom:14px">⚖️ Compare ${models.length} Models</h2>`;
  html += `<table class="compare-table"><thead><tr><th>Attribute</th>${models.map(m=>`<th>${m.n}</th>`).join('')}</tr></thead><tbody>`;
  const attrs = [
    ['Owner', m=>getOwner(m)],
    ['Description', m=>m.d||'—'],
    ['Pulls', m=>formatPulls(m.p||0)],
    ['Capabilities', m=>(m.c||[]).map(c=>`${CAP_ICONS[c]||''} ${c}`).join(', ')],
    ['Sizes', m=>(m.s||[]).join(', ')||'—'],
    ['Cloud Usage', m=>{ const u=getUsage(m); return u?u.map(x=>`${x.tag}: ${x.usage} (${x.bars}/4 bars, ${x.context})`).join('<br>'):'Local only'; }],
    ['Cost Level', m=>{ const u=getUsage(m); if(!u) return 'Free (local)'; const h=Math.max(...u.map(x=>x.bars)); let dots=''; for(let i=0;i<4;i++) dots+=`<div class="cost-dot ${i<h?'on':''}"></div>`; return `<div class="cost-indicator">${dots}</div>`; }],
  ];
  // Add benchmark rows
  BENCH_KEYS.forEach(k => {
    attrs.push([`📊 ${BENCH_NAMES[k]}`, m=>{ const b=getBench(m); if(!b||b[k]==null) return '—'; return k==='arena_elo'?b[k]:b[k].toFixed(1); }]);
  });
  attrs.forEach(([label, fn]) => {
    html += `<tr><td><strong>${label}</strong></td>${models.map(m=>`<td>${fn(m)}</td>`).join('')}</tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('visible');
}
function closeModal(e) { if(e.target===document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('visible'); }

render();
renderBenchFilters();
</script>
